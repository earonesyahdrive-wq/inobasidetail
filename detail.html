<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Detail Inovasi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS UTAMA -->
    <link rel="stylesheet" href="../../assets/style.css">

    <!-- CSS DETAIL (tambahan khusus halaman ini) -->
    <link rel="stylesheet" href="style-detail.css">
</head>

<body>

<div class="container">

    <!-- HERO -->
    <section class="hero">
        <h1>👁️ Detail Ide & Inovasi</h1>
        <p>Viewer data dari Firebase Realtime Database</p>
    </section>

    <!-- SEARCH -->
    <section class="card">
        <h2>🔎 Pencarian Data</h2>
        <input type="text" id="search" placeholder="Cari judul / unit kerja / kategori...">
    </section>

    <!-- TABLE -->
    <section class="card">

        <h2>📋 Daftar Ide & Inovasi</h2>

        <div class="table-wrapper">
            <table class="data-table">

                <thead>
                    <tr>
                        <th>Judul</th>
                        <th>Unit Kerja</th>
                        <th>Kategori</th>
                        <th>Aksi</th>
                    </tr>
                </thead>

                <tbody id="tableData"></tbody>

            </table>
        </div>

    </section>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<!-- CONFIG & APP -->
<script src="firebase-config.js"></script>
<script src="detail.js"></script>
    <link rel="stylesheet" href="style.css">
</body>

</html>
