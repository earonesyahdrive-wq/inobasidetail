<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Ide & Inovasi</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- STYLE -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<div class="loading" id="loading">Memproses...</div>
<div class="toast" id="toast"></div>

<div class="container">

    <!-- HERO -->
    <section class="hero">
        <h1>🚀 Administratori</h1>
        <p>Sistem manajemen penyampaian inovasi</p>

        <div class="hero-stats">
            <div>
                <h2 id="statTotal">0</h2>
                <span>Total</span>
            </div>
            <div>
                <h2 id="statDigital">0</h2>
                <span>Digitalisasi</span>
            </div>
            <div>
                <h2 id="statPelayanan">0</h2>
                <span>Pelayanan</span>
            </div>
            <div>
                <h2 id="statAdmin">0</h2>
                <span>Administrasi</span>
            </div>
        </div>
    </section>

    <!-- FORM -->
    <section class="card">

        <h2>📝 Form Ide & Inovasi</h2>

        <form id="formIde">

            <label>Nama Pegawai</label>
            <input type="text" id="nama" required>

            <label>Unit Kerja</label>
            <input type="text" id="unitKerja" required>

            <label>Judul Inovasi</label>
            <input type="text" id="judul" required>

            <label>Kategori</label>
            <select id="kategori" required>
                <option value="">Pilih</option>
                <option value="Digitalisasi">Digitalisasi</option>
                <option value="Pelayanan">Pelayanan</option>
                <option value="Administrasi">Administrasi</option>
                <option value="Pengawasan">Pengawasan</option>
            </select>

            <label>Ketua Tim</label>
            <input type="text" id="ketuaTim" required>

            <label>Latar Belakang</label>
            <textarea id="latarBelakang" required></textarea>

            <label>Deskripsi</label>
            <textarea id="deskripsi" required></textarea>

            <hr>

            <h3>📌 Dasar Hukum</h3>
            <div id="daftarDasarHukum">
                <input type="text" class="dasarHukum" placeholder="Dasar hukum">
            </div>
            <button type="button" id="btnTambahDasarHukum">+ Tambah</button>

            <hr>

            <h3>👥 Anggota Tim</h3>
            <div id="daftarAnggota">
                <input type="text" class="anggota" placeholder="Nama anggota">
            </div>
            <button type="button" id="btnTambahAnggota">+ Tambah</button>

            <hr>

            <h3>📎 Lampiran PDF</h3>
            <input type="file" id="lampiran" accept="application/pdf">

            <br><br>

            <!-- PROGRESS BAR (FIX CLEAN) -->
            <div class="progress">
                <div id="uploadProgress" class="progress-bar"></div>
            </div>

            <br>

            <button type="button" id="btnSimpan" class="btn-save">
                💾 Simpan Data
            </button>

            <button type="button" id="btnReset" class="btn-edit">
                🔄 Reset
            </button>

        </form>

    </section>

    <!-- TABLE -->
    <section class="card">

        <h2>📊 Daftar Inovasi</h2>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Judul</th>
                        <th>Unit</th>
                        <th>Kategori</th>
                        <th>Aksi</th>
                    </tr>
                </thead>

                <tbody id="tbodyIde"></tbody>
            </table>
        </div>

    </section>

</div>

<!-- MODAL DETAIL -->
<div id="modalDetail" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:9999;">

    <div style="background:#fff;padding:20px;width:90%;max-width:500px;border-radius:10px;">

        <h2>📄 Detail Ide</h2>
        <div id="detailContent" style="margin-top:10px;"></div>

        <button onclick="document.getElementById('modalDetail').style.display='none'" style="margin-top:15px;padding:8px 12px;border:none;background:#ef4444;color:#fff;border-radius:6px;">
            Tutup
        </button>

    </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="app.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
