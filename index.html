<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        http-equiv="X-UA-Compatible"
        content="IE=edge">

    <meta
        name="theme-color"
        content="#f97316">

    <title>
        Admin Inovasi Pegawai
    </title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <div>

            <h1>
                Admin Inovasi Pegawai
            </h1>

            <p>
                Dashboard Monitoring Inovasi Pegawai
            </p>

        </div>

        <button
            class="btn-primary"
            onclick="loadData()">

            ðŸ”„ Refresh

        </button>

    </header>

    <!-- DASHBOARD -->

    <section
        class="dashboard">

        <div class="stat-card">

            <div class="stat-title">
                Total Inovasi
            </div>

            <div
                class="stat-value"
                id="totalInovasi">

                0

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">
                Diajukan
            </div>

            <div
                class="stat-value"
                id="totalDiajukan">

                0

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">
                Disetujui
            </div>

            <div
                class="stat-value"
                id="totalDisetujui">

                0

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">
                Ditolak
            </div>

            <div
                class="stat-value"
                id="totalDitolak">

                0

            </div>

        </div>

    </section>

    <!-- FILTER -->

    <section class="card">

        <div class="toolbar">

            <input
                type="text"
                id="search"
                placeholder="Cari NIP, Nama, Judul Inovasi..."
                onkeyup="cariData()">

            <select
                id="filterStatus"
                onchange="applyFilter()">

                <option value="">
                    Semua Status
                </option>

                <option value="diajukan">
                    Diajukan
                </option>

                <option value="disetujui">
                    Disetujui
                </option>

                <option value="ditolak">
                    Ditolak
                </option>

            </select>

            <select
                id="filterKategori"
                onchange="applyFilter()">

                <option value="">
                    Semua Kategori
                </option>

                <option value="Digitalisasi">
                    Digitalisasi
                </option>

                <option value="Pelayanan">
                    Pelayanan
                </option>

                <option value="Administrasi">
                    Administrasi
                </option>

                <option value="Pengawasan">
                    Pengawasan
                </option>

                <option value="Kepegawaian">
                    Kepegawaian
                </option>

            </select>

        </div>

    </section>

    <!-- TABEL -->

    <section
        class="table-container">

        <table>

            <thead>

                <tr>

                    <th>NIP</th>

                    <th>Nama Pegawai</th>

                    <th>Judul Inovasi</th>

                    <th>Kategori</th>

                    <th>Probabilitas</th>

                    <th>Status</th>

                    <th>Aksi</th>

                </tr>

            </thead>

            <tbody id="output">

                <tr>

                    <td
                        colspan="7"
                        align="center">

                        Memuat data...

                    </td>

                </tr>

            </tbody>

        </table>

    </section>

    <!-- MODAL DETAIL -->

    <div
        class="modal"
        id="detailModal">

        <div class="modal-content">

            <div class="modal-header">

                <h2>
                    Detail Inovasi
                </h2>

                <button
                    class="btn-danger"
                    onclick="tutupModal()">

                    âœ• Tutup

                </button>

            </div>

            <div id="detailBody">

            </div>

        </div>

    </div>

    <!-- LOADING -->

    <div
        class="modal"
        id="loadingModal">

        <div class="modal-content">

            <div class="loading">

                <div class="spinner"></div>

                <p>
                    Memproses Data...
                </p>

            </div>

        </div>

    </div>

    <!-- TOAST -->

    <div
        id="toast"
        class="toast">

    </div>

    <!-- FIREBASE V8 -->

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- APP -->

    <script src="app.js"></script>

</body>

</html>
